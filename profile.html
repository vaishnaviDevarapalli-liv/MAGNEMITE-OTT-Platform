<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MAGNEMITE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="ott[1].css">
    <style>
        body { 
            background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%); 
            min-height: 100vh;
        }
        .profile-wrapper { margin-top: 100px; padding-bottom: 50px; }
        
        /* Profile Header */
        .user-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .avatar-bg {
            width: 100px; height: 100px;
            background: linear-gradient(45deg, #e50914, #ff5f6d);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 20px;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }

        /* Watchlist Styling */
        .watchlist-section { margin-top: 50px; }
        .movie-item-wrap { position: relative; transition: transform 0.3s; }
        .movie-item-wrap:hover { transform: scale(1.05); }
        .movie-item-wrap img { border-radius: 10px; width: 100%; height: 250px; object-fit: cover; }
        
        .remove-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(229, 9, 20, 0.9);
            color: white; border: none;
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
            z-index: 5;
        }
        .remove-badge:hover { background: white; color: #e50914; transform: scale(1.2); }

        .btn-back { border: 1px solid rgba(255,255,255,0.3); color: white; transition: 0.3s; }
        .btn-back:hover { background: white; color: black; }
    </style>
</head>
<body class="text-white">

    <nav class="navbar navbar-expand-lg fixed-top bg-black">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="index.html">MAGNEMITE</a>
        </div>
    </nav>

    <div class="container profile-wrapper">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <div class="user-card animate-fade-in">
                    <div class="avatar-bg"><i class="fa-solid fa-user"></i></div>
                    <h2 id="display-name" class="fw-bold mb-1">Loading...</h2>
                    <p id="display-email" class="text-secondary mb-4">email@example.com</p>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="goBack()" class="btn btn-back px-4 fw-bold">
                            <i class="fa-solid fa-arrow-left me-2"></i> Continue Watching
                        </button>
                        <button onclick="logout()" class="btn btn-danger px-4 fw-bold">Sign Out</button>
                    </div>
                </div>

                <div class="watchlist-section">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold">My Watchlist</h3>
                        <span id="list-count" class="badge bg-danger rounded-pill">0 Items</span>
                    </div>
                    
                    <div id="watchlist-grid" class="row g-4">
                        </div>
                    
                    <div id="empty-state" class="text-center py-5" style="display: none;">
                        <i class="fa-solid fa-clapperboard fs-1 text-secondary mb-3"></i>
                        <p class="text-secondary">Your watchlist is currently empty.</p>
                        <a href="movies.html" class="btn btn-outline-danger btn-sm">Browse Movies</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ON PAGE LOAD
        document.addEventListener("DOMContentLoaded", function() {
            // Load User Info from SessionStorage
            const name = sessionStorage.getItem("userName") || "Guest User";
            const email = sessionStorage.getItem("userEmail") || "Guest@magnemite.com";
            
            document.getElementById("display-name").innerText = name;
            document.getElementById("display-email").innerText = email;

            renderWatchlist();
        });

        // SMART BACK NAVIGATION
        function goBack() {
            // Checks if there is a previous page in history, otherwise goes to Home
            if (document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = "index.html";
            }
        }

        // LOGOUT LOGIC
        function logout() {
            if(confirm("Are you sure you want to sign out?")) {
                sessionStorage.clear();
                window.location.href = "ott-html.html";
            }
        }

        // RENDER WATCHLIST FROM LOCALSTORAGE
        function renderWatchlist() {
            const list = JSON.parse(localStorage.getItem('myWatchlist')) || [];
            const grid = document.getElementById('watchlist-grid');
            const emptyState = document.getElementById('empty-state');
            const countBadge = document.getElementById('list-count');

            countBadge.innerText = `${list.length} Items`;

            if (list.length === 0) {
                grid.innerHTML = "";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            grid.innerHTML = list.map((movie, index) => `
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="movie-item-wrap">
                        <button class="remove-badge" onclick="removeItem(${index})" title="Remove from list">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <img src="${movie.image}" alt="${movie.title}">
                        <div class="mt-2">
                            <h6 class="mb-0 small fw-bold">${movie.title}</h6>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // REMOVE LOGIC
        function removeItem(index) {
            let list = JSON.parse(localStorage.getItem('myWatchlist')) || [];
            list.splice(index, 1); // Remove item at specific index
            localStorage.setItem('myWatchlist', JSON.stringify(list));
            renderWatchlist(); // Refresh the UI
        }
    </script>
</body>
</html>
